name: movie_app
description: "Movie Hub — Netflix-style movie app powered by TMDB."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shimmer: ^3.0.0
  go_router: ^14.2.0
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
